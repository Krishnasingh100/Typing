<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <h1>Typing Master</h1>

            <div class="stats-inline">
                <div class="stat">
                    WPM: <span id="wpm">0</span>
                </div>

                <div class="stat">
                    Accuracy: <span id="accuracy">100</span>%
                </div>

                <div class="stat">
                    Errors: <span id="errors">0</span>
                </div>

                <div class="stat">
                    Time: <span id="time">0</span>s
                </div>
            </div>
        </div>
        <div class="type-area">
            <div class="text-display" id="textDisplay"></div>
            <input id="hiddenInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="position:absolute;opacity:0;width:1px;height:1px;border:none;" />
        </div>
        <div class="actions">
            <button id="resetBtn">Restart</button>
        </div>
        
        <div class="hint">
            Click on the text or start typing to begin the test.
        </div>

    </div>


    <!-- Popup Results Container -->
    <div id="resultsPopup" class="results-popup" style="display:none;">
        <div class="results-popup-content">
            <h2>Typing Test Results</h2>
            <p><strong>Time:</strong> <span id="popupTime"></span> seconds</p>
            <p><strong>Errors:</strong> <span id="popupErrors"></span></p>
            <p><strong>WPM:</strong> <span id="popupWpm"></span></p>
            <p><strong>Accuracy:</strong> <span id="popupAccuracy"></span>%</p>
            <button id="closePopupBtn">Close</button>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>

</body>
</html>
